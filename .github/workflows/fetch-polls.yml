name: "Fetch Polls"

on:
  schedule:
    - cron: '23 11 * * *'   # 11:23 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-polls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch poll data
        run: node js/fetch-data.js

      - name: Save changes
        run: |
          git config user.name "Bot"
          git config user.email "bot@users.noreply.github.com"
          git add json/polls.json
          git commit -m "Update polls $(date -u +%Y-%m-%d\ %H:%M)" || exit 0
          git push
