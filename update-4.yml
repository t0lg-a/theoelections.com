name: Daily Data Fetch & Odds

on:
  schedule:
    - cron: '23 11 * * *'   # 11:23 UTC daily
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  refresh-and-compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch poll data
        run: node js/fetch-data.js

      - name: Build county ratios
        run: node js/build_county_ratios.js

      - name: Compute MC seat odds
        run: node js/compute_odds.js

      - name: Save changes
        run: |
          git config user.name "Bot"
          git config user.email "bot@users.noreply.github.com"
          git add json/
          git commit -m "Update polls + odds $(date -u +%Y-%m-%d)" || exit 0
          git push
